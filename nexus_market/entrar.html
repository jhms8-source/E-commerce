<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Nexus Market</title>
    <link rel="stylesheet" href="/style/auth.css">
</head>

<body>

    <div class="container">

        <div class="login-box">

            <div class="logo">
                <h1>Nexus Market</h1>
                <p>Bem-vindo de volta!</p>
            </div>

            <form>

                <div class="input-box">
                    <label>E-mail</label>
                    <input type="email" placeholder="Digite seu e-mail">
                </div>

                <div class="input-box">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite sua senha">
                </div>

                <a href="#" class="esqueci">Esqueceu sua senha?</a>

                <button type="submit" class="btn-principal">
                    Entrar
                </button>

            </form>

            <div class="divisor">
                <span>ou</span>
            </div>

            <button class="btn-google">
                <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
                Entrar com Google
            </button>

            <button class="btn-apple">
                <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
                Entrar com Apple
            </button>

            <div class="cadastro">

                <p>Não possui uma conta?</p>

                <a href="/nexus_market/cadastro.html">
                    Criar Conta
                </a>

            </div>

        </div>

    </div>

</body>

</html>
