<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Nexus Market</title>

    <link rel="stylesheet" href="../style/auth.css">
</head>

<body>

    <div class="container">

        <div class="login-box">

            <div class="logo">
                <h1>Nexus Market</h1>
                <p>Recuperação de Senha</p>
            </div>

            <div class="mensagem">

                <p>
                    Digite seu e-mail cadastrado. Enviaremos um link para redefinir sua senha.
                </p>

            </div>

            <form>

                <div class="input-box">
                    <label>E-mail</label>
                    <input type="email" placeholder="Digite seu e-mail">
                </div>

                <button class="btn-principal">
                    Enviar Link de Recuperação
                </button>

            </form>

            <div class="cadastro">

                <p>Lembrou sua senha?</p>

                <a href="entrar.html">
                    Voltar para Login
                </a>

            </div>

        </div>

    </div>

</body>

</html>
