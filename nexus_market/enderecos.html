<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Endereços | Nexus Market</title>
    <link rel="stylesheet" href="/style/enderecos.css">
    <link rel="stylesheet" href="/style/theme.css">
    <link rel="icon" type="image/png" href="/imagens/logo2.png">
</head>

<body>

    <header>

        <div class="logo">
            <h1>Nexus Market</h1>
        </div>

        <nav>
            <button class="theme-toggle" type="button" id="themeToggle">☀️ Claro</button>
            <a href="/nexus_market/inicio.html">Início</a>
            <a href="/nexus_market/carrinho.html">Carrinho</a>
            <a href="/nexus_market/minha-conta.html">Minha Conta</a>
        </nav>

    </header>

    <main class="pagina">

        <h2>📍 Meus Endereços</h2>

        <p class="descricao">
            Você pode gerenciar seus endereços cadastrados aqui.
        </p>

        <div id="lista-enderecos" class="lista-enderecos">

            <!-- Os endereços cadastrados aparecem aqui. -->

        </div>

        <div class="novo-endereco">
            <button type="button" id="btnAdicionarEndereco">+ Adicionar Novo Endereço</button>
        </div>

        <form id="formEndereco" class="form-endereco">
            <h3>Adicionar endereço</h3>
            <input type="text" id="tituloEndereco" placeholder="Ex.: Casa, Trabalho" required>
            <input type="text" id="cepEndereco" placeholder="CEP" required>
            <input type="text" id="logradouroEndereco" placeholder="Logradouro" required>
            <input type="text" id="numeroEndereco" placeholder="Número" required>
            <input type="text" id="bairroEndereco" placeholder="Bairro" required>
            <input type="text" id="cidadeEndereco" placeholder="Cidade" required>
            <input type="text" id="estadoEndereco" placeholder="Estado" required>
            <button type="submit" id="btnSalvarEndereco" class="btn-salvar">Salvar endereço</button>
        </form>

    </main>

    <footer>

        <div class="footer-coluna">
            <h4>Suporte</h4>
            <a href="#">Fale Conosco</a>
            <a href="#">Trocas e Devoluções</a>
        </div>

        <div class="footer-coluna">
            <h4>Institucional</h4>
            <a href="#">Quem Somos</a>
            <a href="#">Política de Privacidade</a>
        </div>

        <div class="footer-coluna">
            <h4>Pagamento</h4>
            <p>Pix • Cartão • Boleto</p>
        </div>

    </footer>

    <script src="../javascript/auth-guard.js"></script>
    <script src="../javascript/enderecos.js"></script>
    <script src="../javascript/theme.js"></script>
</body>

</html>
