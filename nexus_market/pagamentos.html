<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamentos | Nexus Market</title>
    <link rel="stylesheet" href="/style/pagamentos.css">
    <link rel="icon" type="image/png" href="/imagens/logo2.png">
</head>

<body>

<header>

    <div class="logo">
        <h1>Nexus Market</h1>
    </div>

    <nav>
        <a href="/nexus_market/inicio.html">Início</a>
        <a href="/nexus_market/carrinho.html">Carrinho</a>
        <a href="/nexus_market/minha-conta.html">Minha Conta</a>
    </nav>

</header>

<main class="pagina">

<h2>💳 Meus Pagamentos</h2>

<p class="descricao">
Adicione e gerencie seus cartões de créditos e outras formas de pagamento aqui.
</p>

<div id="lista-pagamentos" class="lista-pagamentos">

<!--
O JavaScript do seu amigo irá inserir
os cartões automaticamente aqui.
-->

</div>

<div class="novo-cartao">

<button type="button" id="btnAdicionarCartao">+ Adicionar Cartão</button>

<form id="formCartao" class="form-cartao hidden">
    <h3>Adicionar novo cartão</h3>
    <label>
        Nome no cartão
        <input type="text" id="nomeCartao" placeholder="Ex: João da Silva" required>
    </label>
    <label>
        Número do cartão
        <input type="text" id="numeroCartao" placeholder="0000 0000 0000 0000" maxlength="19" required>
    </label>
    <div class="linha-campos">
        <label>
            Validade
            <input type="text" id="validadeCartao" placeholder="MM/AA" maxlength="5" required>
        </label>
        <label>
            CVV
            <input type="text" id="cvvCartao" placeholder="123" maxlength="4" required>
        </label>
    </div>
    <div class="botoes-form">
        <button type="submit" class="btn-salvar">Salvar cartão</button>
        <button type="button" id="btnCancelarCartao" class="btn-cancelar">Cancelar</button>
    </div>
</form>

</div>

</main>

<footer>

<div class="footer-coluna">
<h4>Suporte</h4>
<a href="#">Fale Conosco</a>
<a href="#">Trocas e Devoluções</a>
</div>

<div class="footer-coluna">
<h4>Institucional</h4>
<a href="#">Quem Somos</a>
<a href="#">Política de Privacidade</a>
</div>

<div class="footer-coluna">
<h4>Pagamento</h4>
<p>Pix • Cartão • Boleto</p>
</div>

</footer>

    <script src="../javascript/auth-guard.js"></script>
    <script src="../javascript/pagamentos.js"></script>
</body>

</html>
